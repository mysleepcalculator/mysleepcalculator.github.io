<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="My Sleep Calculator Logo">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#3a2fb8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd86b"/>
      <stop offset="100%" stop-color="#ffb347"/>
    </linearGradient>
  </defs>
  <!-- Circle bg -->
  <circle cx="30" cy="30" r="24" fill="url(#g1)"/>
  <!-- Crescent moon -->
  <path d="M36 18 a14 14 0 1 0 0 24 a11 11 0 1 1 0 -24z" fill="url(#g2)"/>
  <!-- Stars -->
  <circle cx="20" cy="20" r="1.4" fill="#fff"/>
  <circle cx="16" cy="34" r="1" fill="#fff"/>
  <circle cx="24" cy="44" r="1.2" fill="#fff"/>
  <!-- Z's -->
  <text x="44" y="22" font-family="Poppins, Arial, sans-serif" font-size="10" font-weight="700" fill="#ffd86b">z</text>
  <text x="50" y="16" font-family="Poppins, Arial, sans-serif" font-size="7" font-weight="700" fill="#ffd86b">z</text>
  <!-- Wordmark -->
  <text x="64" y="28" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="800" fill="#1b1240">My Sleep</text>
  <text x="64" y="46" font-family="Poppins, Arial, sans-serif" font-size="15" font-weight="800" fill="#7c5cff">Calculator</text>
</svg>
